services:
  api:
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      SESSION_LIMIT_SUBQUERY: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-network
      - app-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env.docker
    networks:
      db-network:
        aliases:
          - postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -d \"$${POSTGRES_DB}\" -U \"$${POSTGRES_USER}\""
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

networks:
  db-network:
