version:
  number: 8
  checksum: 1a60befd4f455be0468f2afb6b4bd41e12abd93fff463cc1d886093a87a3c536
  message: null
  exportedVersionId: 26c6c47c-0518-4c49-8d63-277c53a8023a
definitionYml: |
  defaults:
    settings:
      timeout_ms: 0
      retries:
        enabled: false
        max_attempts: 3
        backoff_ms: 25
        max_delay_ms: 10000
        jitter: 0
        multiplier: 1
  defs:
    generate_ideas:
      kind: task
      description: Generate 3 creative LinkedIn post ideas from the user's topic
      action: ai_generate_reply
      inputs:
        input_mode: prompt
        prompt: =$input.text
        messages_limit: 4
        system: You are a LinkedIn content strategist. Based on the topic provided,
          generate 3 creative LinkedIn post ideas. For each idea, give a
          compelling headline and explain the angle. Make them specific,
          actionable, and tailored for LinkedIn's professional audience. Focus on
          topics that spark conversation and position the author as a thought
          leader.
      bindings:
        model: model
    double_check:
      kind: task
      description: Review ideas for accuracy, tone, and engagement potential
      action: ai_generate_reply
      inputs:
        input_mode: prompt
        prompt: =$output.generate_ideas.text
        system: >-
          You are a rigorous content reviewer. Review the LinkedIn post ideas for:

          1. Factual accuracy - any questionable or unsupported claims?

          2. Tone - appropriate for LinkedIn's professional environment?

          3. Engagement potential - will readers want to comment and share?

          4. Clarity - is the core message clear and focused?


          Start your response with exactly "PASS" on the first line if everything
          looks good, or "NEEDS_REVISION" if there are issues to fix. Then provide
          your detailed feedback.
      bindings:
        model: model
    regenerate_ideas:
      kind: task
      description: Revise ideas incorporating the reviewer's feedback (conditional)
      action: ai_generate_reply
      inputs:
        input_mode: prompt
        prompt: '="Original ideas: "&$output.generate_ideas.text&"\nReviewer feedback:
          "&$output.double_check.text'
        messages_limit: 4
        system: Revise the LinkedIn post ideas based on the reviewer's feedback. Address
          all issues raised while keeping the core message compelling. Produce 3
          improved ideas that maintain creative quality while being more accurate
          and impactful.
      bindings:
        model: model
    refine_for_linkedin:
      kind: task
      description: Develop the best idea into polished content
      action: ai_generate_reply
      inputs:
        input_mode: prompt
        prompt: '="Best ideas for LinkedIn post: "&$output.generate_ideas.text&"\n
          Quality review: "&$output.double_check.text'
        messages_limit: 4
        system: >-
          You are a LinkedIn content expert. Select the best idea and develop it
          into polished, engaging content. Focus on:

          - A scroll-stopping hook in the first line

          - Personal insight or professional storytelling

          - Clear value proposition for the reader

          - Professional yet conversational tone

          - A natural call to action (question or invitation to discuss)
      bindings:
        model: model
    format_linkedin_post:
      kind: task
      description: Format refined content as a ready-to-post LinkedIn update
      action: ai_generate_reply
      inputs:
        input_mode: prompt
        prompt: =$output.refine_for_linkedin.text
        system: >-
          Format the following as a ready-to-post LinkedIn update:

          - Hook line (bold claim, surprising stat, or provocative question)

          - 1 blank line

          - Body: 2-4 short paragraphs (1-2 lines each)

          - 1 blank line

          - Call to action

          - 1 blank line

          - 3-4 relevant hashtags


          Keep the total post under 1500 characters. Use line breaks between
          sections. Do not use markdown formatting. Make it sound authentically
          human, not like AI.
      bindings:
        model: model
    send_farewell:
      kind: task
      description: Farewell message after completion
      action: send_text_message
      inputs:
        text: Your LinkedIn post is ready to copy and share. Come back anytime!
    model:
      kind: model
      settings:
        provider: gemini
        model_id: gemma-4-31b-it
        api_key: 101698b3-77de-4031-a9ae-df144dc6025d
    linkedin_publisher:
      kind: task
      description: Publishes a post to LinkedIn via API v2
      action: linkedin_publisher
      inputs:
        text: =$output.format_linkedin_post.text
  flow:
    - do: generate_ideas
    - do: double_check
    - conditional:
        description: If reviewer flagged issues, regenerate improved ideas before refinement
        when:
          - condition: =$contains($output.double_check.text, 'NEEDS_REVISION')
            steps:
              - do: regenerate_ideas
          - else: true
            steps: []
    - do: refine_for_linkedin
    - do: format_linkedin_post
    - do: linkedin_publisher
  outputs:
    final_post: =$output.format_linkedin_post.text
    review_verdict: =$output.double_check.text
